<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourKitchen — Study</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --sage:#3D6B4F; --sageMid:#6B9E7E; --sageLight:#EAF2ED; --cream:#FAFAF5;
    --forest:#1E2620; --stone:#6B7066; --border:#DDE8E0; --white:#fff;
    --serif:'Lora',Georgia,serif; --sans:'DM Sans',system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--sans);color:var(--forest);background:var(--cream);-webkit-font-smoothing:antialiased}
  .mast{max-width:1100px;margin:0 auto;padding:40px 20px 18px}
  .kicker{font-size:11px;font-weight:600;letter-spacing:.2em;color:var(--sageMid);text-transform:uppercase;margin-bottom:9px}
  h1{font-family:var(--serif);font-size:34px;font-weight:600;margin:0;letter-spacing:-.7px;line-height:1.05}
  .lede{font-size:14.5px;color:var(--stone);margin-top:12px;max-width:620px;line-height:1.6}
  .tabwrap{position:sticky;top:0;z-index:20;background:rgba(250,250,245,.92);backdrop-filter:blur(8px);border-bottom:.5px solid var(--border)}
  .tabs{max-width:1100px;margin:0 auto;display:flex;gap:4px;padding:10px 20px;overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--stone);background:transparent;border:none;border-radius:10px;padding:9px 15px;cursor:pointer;white-space:nowrap;transition:all .15s}
  .tab:hover{background:var(--sageLight);color:var(--sage)}
  .tab.active{background:var(--sage);color:#fff;font-weight:600}
  .stage{max-width:1100px;margin:0 auto;padding:24px 20px 70px}
  .panel{display:none}
  .panel.show{display:block}
  iframe{width:100%;border:none;display:block;border-radius:16px;overflow:hidden;background:transparent;min-height:600px}
  footer{max-width:1100px;margin:0 auto;padding:0 20px 50px;text-align:center}
  footer .rule{height:1px;background:var(--border);margin-bottom:22px}
  footer p{font-size:13px;color:var(--stone)}
</style>
</head>
<body>
  <div class="mast">
    <div class="kicker">YourKitchen &middot; Study</div>
    <h1>Your kitchen, covered.</h1>
    <p class="lede">A care platform that activates a recipient&rsquo;s existing village to send real, home-delivered meals through life&rsquo;s hardest seasons.</p>
  </div>
  <div class="tabwrap"><div class="tabs" id="tabs"></div></div>
  <div class="stage" id="stage"></div>
  <footer><div class="rule"></div><p>yourkitchen.app &middot; Made for the people who show up.</p></footer>
  <script>
    var BASE = '/study/';  // if you ever move the folder, change this one line
    var PAGES = [
      { id:'positioning', label:'Positioning',      src:'positioning.html' },
      { id:'roadmap',     label:'Roadmap',          src:'horizon.html' },
      { id:'system',      label:'System',           src:'system-flow.html' },
      { id:'how',         label:'How it works',     src:'tiers-features.html' },
      { id:'dashboard',   label:'Client Dashboard', src:'client-dashboard.html' },
      { id:'sales',       label:'B2B sales',        src:'b2b-sales-flow.html' },
      { id:'model',       label:'B2B model',        src:'model.html' },
      { id:'village',     label:'Village',          src:'tutorial-mockup.html' },
      { id:'overview',    label:'Overview',         src:'brochure.html' },
      
    ];
    var tabsEl = document.getElementById('tabs');
    var stageEl = document.getElementById('stage');
    PAGES.forEach(function(p){
      var b = document.createElement('button');
      b.className = 'tab'; b.id = 'tab-' + p.id; b.textContent = p.label;
      b.onclick = function(){ activate(p.id); };
      tabsEl.appendChild(b);
      var panel = document.createElement('div');
      panel.className = 'panel'; panel.id = 'panel-' + p.id;
      var frame = document.createElement('iframe');
      frame.id = 'frame-' + p.id;
      frame.title = p.label;
      frame.setAttribute('scrolling','no');
      frame.setAttribute('data-src', p.src);
      frame.addEventListener('load', function(){ fit(frame); });
      panel.appendChild(frame);
      stageEl.appendChild(panel);
    });
    function fit(frame){
      try{
        var h = frame.contentWindow.document.body.scrollHeight;
        if(h && h > 40) frame.style.height = h + 'px';
      }catch(e){}
    }
    function activate(id){
      PAGES.forEach(function(p){
        var tab = document.getElementById('tab-' + p.id);
        var panel = document.getElementById('panel-' + p.id);
        var frame = document.getElementById('frame-' + p.id);
        var on = (p.id === id);
        tab.classList.toggle('active', on);
        panel.classList.toggle('show', on);
        if(on){
          if(!frame.getAttribute('src')) frame.setAttribute('src', BASE + frame.getAttribute('data-src'));
          setTimeout(function(){ fit(frame); }, 60);
          setTimeout(function(){ fit(frame); }, 500);
        }
      });
      if(history.replaceState) history.replaceState(null, '', '#' + id);
    }
    var start = (location.hash || '').replace('#','');
    if(!PAGES.some(function(p){ return p.id === start; })) start = PAGES[0].id;
    activate(start);
    window.addEventListener('resize', function(){
      var active = document.querySelector('.panel.show iframe');
      if(active){ clearTimeout(window._rt); window._rt = setTimeout(function(){ fit(active); }, 200); }
    });
  </script>
</body>
</html>
